workflows:
  ios-release:
    name: Apex Jump Coach - iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Apex Jump Coach"   # the integration name shown in Codemagic > Apple Developer Portal integration
    environment:
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.jordanwenger.apexjumpcoach"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6792364870
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Sync Capacitor (copies web assets + native plugins into the Xcode project)
        script: |
          npx cap sync ios
      - name: Fetch signing files (creates a distribution certificate and provisioning profile via the App Store Connect API key if none exist yet)
        script: |
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create --certificate-key=@file:/tmp/cert_key.pem
      - name: Add the fetched certificate to the build's keychain
        script: |
          keychain initialize
          keychain add-certificates
      - name: Apply the fetched profile to the Xcode project's code signing settings
        script: |
          xcode-project use-profiles
      - name: Bump build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID") + 1))
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jordanlbwenger@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip this to true only once you're ready to send a build to
        # App Review (after TestFlight testing looks good):
        submit_to_app_store: false
